services:
  frontend:
    container_name: ${PROJECT_NAME}-frontend
    image: ${PROJECT_NAME}-frontend:latest
    build:
      context: .
      target: development
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=80
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - global_dev_net
    labels:
      caddy: ${DOMAIN}
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 3000}}"

networks:
  global_dev_net:
    external: true
    name: global_dev_net